# Full self-hosted stack (spec NOTIF-12): redis (durable queue backing
# store), api (accepts POST /notify, enqueues dispatch jobs), worker
# (processes dispatch + delivery jobs against the channel adapters), admin
# (dockerized admin panel, spec Amendment 1 / ADMIN-08; config CRUD rewired
# to SQLite by DBCH-08/DBCH-10 -- the admin only shells out to `docker
# compose` for worker-log tailing now, never to apply config).
#
# `name:` is pinned so that `docker compose logs worker`, invoked FROM
# INSIDE the admin container against its bind-mounted copy of this file
# (at /config/docker-compose.yml, whose containing directory's basename is
# "config", not "notify-hub"), still resolves to this exact project.
# Without it, compose would derive the project name from that basename and
# look for a different, non-existent stack.
name: notify-hub

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  api:
    build: .
    command: node dist/bin/api.js
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL: redis://redis:6379
      # SQLite config store (DBCH-01/DBCH-10): channels + profiles live here,
      # not in .env. Shared with worker + admin via the notify-data volume
      # (WAL journaling lets all three processes read/write the same file
      # safely -- see src/db/database.ts).
      DB_PATH: /data/notify-hub.db
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - notify-data:/data
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      # alpine has no curl; use Node's global fetch against our own /health.
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch(`http://localhost:$${process.env.PORT||8080}/health`).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build: .
    command: node dist/bin/worker.js
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL: redis://redis:6379
      DB_PATH: /data/notify-hub.db
    volumes:
      - notify-data:/data
    depends_on:
      - redis
    restart: unless-stopped

  admin:
    build:
      context: .
      target: admin
    ports:
      # Default bind 0.0.0.0 matches every other service on this host, so
      # the panel is reachable from the owner's other devices (e.g. over
      # Tailscale as intel:8081). The panel exposes secrets without auth:
      # anyone who can reach this port can read and rewrite the config.
      # Set ADMIN_BIND=127.0.0.1 in .env to make it localhost-only again.
      # The explicit bind template is asserted by
      # src/admin/compose-invariants.test.ts.
      - "${ADMIN_BIND:-0.0.0.0}:${ADMIN_PORT:-8081}:${ADMIN_PORT:-8081}"
    env_file:
      - path: .env
        required: false
    environment:
      ADMIN_HOST: 0.0.0.0
      ADMIN_PORT: ${ADMIN_PORT:-8081}
      # Same shared SQLite file as api/worker (DBCH-08/DBCH-10): the panel
      # reads/writes channels + profiles directly -- a Save is live for the
      # very next request/delivery, no docker compose apply step.
      DB_PATH: /data/notify-hub.db
      # Working directory for the worker-log-tail `docker compose`
      # invocation (status/test-send poll) -- config CRUD is DB-backed and
      # never shells out; this is the ONLY remaining use of the socket
      # mount + compose-dir mount below.
      COMPOSE_DIR: /config
      NOTIFY_GATEWAY_URL: http://api:${PORT:-8080}
    volumes:
      - notify-data:/data
      # Read-only: the admin no longer writes .env (config moved to the DB,
      # DBCH-08 dropped the `.env` FileStore/`/api/apply` route). Kept
      # read-only, project-name-pinned (see `name:` above), solely so
      # `docker compose logs worker` run from inside this container
      # resolves to and can read logs from this same stack.
      - ./docker-compose.yml:/config/docker-compose.yml:ro
      # Grants the container control of the host's Docker daemon so the
      # worker-log tail (status + test-send outcome) can run
      # `docker compose logs worker` against the real stack. Accepted
      # trade-off for a personal, localhost-bound tool (same pattern as
      # Portainer) -- documented in README.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - api
    restart: unless-stopped

volumes:
  redis-data:
  # Single named volume shared by api/worker/admin: one SQLite file at
  # /data/notify-hub.db, survives container recreate; backup = copy the
  # file (or `docker run --rm -v notify-hub_notify-data:/data ... tar`).
  notify-data:
