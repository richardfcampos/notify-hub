<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>notify-hub admin</title>
  <link rel="stylesheet" href="admin-theme.css" />
  <link rel="stylesheet" href="admin-controls.css" />
  <link rel="stylesheet" href="admin-sections.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-brand">
      <span class="brand-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M6 8a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6Z" />
          <path d="M10 20a2 2 0 0 0 4 0" />
        </svg>
      </span>
      <span class="brand-name">notify-hub</span>
    </div>
    <div class="topbar-status">
      <span id="gateway-pill" class="pill pill-unknown">checking…</span>
      <span id="channel-count" class="muted"></span>
      <button id="refresh-btn" class="icon-btn" type="button" aria-label="Refresh status and configuration">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M21 12a9 9 0 1 1-3-6.7M21 3v6h-6" />
        </svg>
      </button>
    </div>
  </header>

  <main class="layout">
    <div id="banner-area"></div>

    <section class="panel" aria-labelledby="channels-heading">
      <h2 id="channels-heading">Channels</h2>
      <div id="channel-grid" class="channel-grid"></div>
    </section>

    <section class="panel" aria-labelledby="profiles-heading">
      <div class="panel-header">
        <h2 id="profiles-heading">Profiles</h2>
        <button id="add-profile-btn" class="btn btn-ghost" type="button">+ Add profile</button>
      </div>
      <div id="profiles-list" class="profiles-list"></div>
    </section>

    <section class="panel" aria-labelledby="deliveries-heading">
      <h2 id="deliveries-heading">Recent deliveries</h2>
      <div id="deliveries-list" class="deliveries-list mono"></div>
    </section>
  </main>

  <div id="toast-area" class="toast-area" aria-live="polite"></div>

  <footer id="save-bar" class="save-bar">
    <span class="save-bar-text">Unsaved changes</span>
    <div class="save-bar-actions">
      <span id="save-steps" class="save-steps"></span>
      <button id="discard-btn" class="btn btn-ghost" type="button">Discard</button>
      <button id="save-btn" class="btn btn-primary" type="button">Save &amp; Apply</button>
    </div>
  </footer>

  <script type="module" src="admin.js"></script>
</body>
</html>
